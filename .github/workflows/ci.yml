name: Learning CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  learn-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Download Repository
        uses: actions/checkout@v4

      - name: Show Current Folder
        run: pwd

      - name: Show Files
        run: ls -la

      - name: Show Date
        run: date

      - name: Print Success Message
        run: echo "Abhishek's CI Pipeline is Working!"